spring.application.name=studyroom-reservation-recommendation

# 1. MySQL \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/studyroom?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=

# 2. JPA & Hibernate \uC124\uC815
# update: Entity \uD074\uB798\uC2A4\uC758 \uBCC0\uACBD\uC0AC\uD56D\uC744 \uAC10\uC9C0\uD558\uC5EC \uC790\uB3D9\uC73C\uB85C DB \uD14C\uC774\uBE14\uC744 \uC0DD\uC131/\uC218\uC815\uD574\uC90C
spring.jpa.hibernate.ddl-auto=update
# \uC2E4\uD589 \uC911 \uBC1C\uC0DD\uD558\uB294 SQL \uCFFC\uB9AC\uB97C \uCF58\uC194 \uCC3D\uC5D0 \uC608\uC058\uAC8C \uCD9C\uB825 (\uB514\uBC84\uAE45\uC6A9)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. JSP View Resolver \uC124\uC815 (\uD654\uBA74 \uB744\uC6B0\uAE30 \uD544\uC218!)
# \uCEE8\uD2B8\uB864\uB7EC\uAC00 "main"\uC744 \uBC18\uD658\uD558\uBA74 -> "/WEB-INF/jsp/" + "main" + ".jsp" \uACBD\uB85C\uC758 \uD30C\uC77C\uC744 \uCC3E\uC544\uAC00\uB3C4\uB85D \uC5F0\uACB0
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp